name: Build Release

on:
  push:
    branches:
      - dev
      - nightly
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Decode Keystore
      env:
        KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
      run: |
        echo "$KEYSTORE_B64" | base64 --decode > ${{ github.workspace }}/Infinity.jks

    - name: Create keystore.properties
      env:
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
      run: |
        echo "keyAlias=$KEY_ALIAS" > keystore.properties
        echo "keyPassword=$KEY_PASSWORD" >> keystore.properties
        echo "storePassword=$STORE_PASSWORD" >> keystore.properties
        echo "storeFile=${{ github.workspace }}/Infinity.jks" >> keystore.properties

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Release APK
      run: ./gradlew assembleRelease || true
      continue-on-error: true

    - name: Build Release APK - Rebuild
      run: ./gradlew assembleRelease

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: continuum-release-build
        path: app/build/outputs/apk/release/*.apk

  deploy-to-fdroid-repo:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download built APK
        uses: actions/download-artifact@v4
        with:
          name: continuum-release-build
          path: ./apk-output

      - name: Push APK to F-Droid apk-upload branch
        run: |
          # Clone only the apk-uploads branch of the fdroids repo
          git clone --branch apk-uploads https://${{ secrets.FDROIDS_REPO_TOKEN }}@github.com/imjuzcy/fdroids.git fdroid-repo
          cd fdroid-repo/repo

          # Copy the newly built APK(s)
          cp ../../apk-output/*.apk .

          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *.apk
          git commit -m "Upload new APK from Continuum build ${{ github.run_number }}"
          git push origin apk-uploads
